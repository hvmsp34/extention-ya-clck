<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: light dark;

      --bg-color: light-dark(#ffffff, #121212);
      --text-color: light-dark(#202124, #f1f3f4);
      --accent-color: light-dark(#ffcc00, #ffdb4d);
      --accent-hover: light-dark(#e6b800, #e6c33c);

      --input-bg: light-dark(#f1f3f4, #2d2d2d);
      --input-border: light-dark(#dae0e5, #404040);
      --input-focus: light-dark(#1a73e8, #8ab4f8);

      --card-bg: light-dark(#f8f9fa, #1e1e1e);
      --link-color: light-dark(#1a73e8, #8ab4f8);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      padding: 16px;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;

      &:focus {
        border-color: var(--input-focus);
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
      }
    }

    .buttons-container {
      display: flex;
      justify-content: flex-end;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: var(--accent-color);
      color: #000000;
      font-size: 13px;
      font-weight: 600;
      transition: background-color 0.15s ease, transform 0.1s ease;

      &:hover {
        background-color: var(--accent-hover);
      }

      &:active {
        transform: scale(0.98);
      }

      &:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
    }

    #resultContainer {
      margin-top: 16px;
      display: none;
      background-color: var(--card-bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--input-border);
      word-break: break-all;
      font-size: 13px;
      animation: fadeIn 0.2s ease forwards;
    }

    #resultLink {
      font-weight: 600;
      color: var(--link-color);
      text-decoration: none;
    }

    #resultLink:hover {
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
  <script src="popup.js" type="module" defer></script>
</head>

<body>

  <h3>Сократить ссылку</h3>

  <input type="text" id="urlInput" placeholder="Вставьте длинную ссылку...">

  <div class="buttons-container">
    <button id="shortenBtn">Сократить</button>
  </div>

  <div id="resultContainer">
    <span>Результат: </span>
    <a href="#" id="resultLink" target="_blank"></a>
  </div>

</body>

</html>
