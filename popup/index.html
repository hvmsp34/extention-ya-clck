<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <style>
    :root {
      color-scheme: light dark;

      --bg-color: light-dark(#ffffff, #121212);
      --text-color: light-dark(#202124, #f1f3f4);
      --accent-color: light-dark(#ffcc00, #ffdb4d);
      --accent-hover: light-dark(#e6b800, #e6c33c);

      --input-bg: light-dark(#f1f3f4, #2d2d2d);
      --input-border: light-dark(#dae0e5, #404040);
      --input-focus: light-dark(#1a73e8, #8ab4f8);

      --card-bg: light-dark(#f8f9fa, #1e1e1e);
      --link-color: light-dark(#1a73e8, #8ab4f8);
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 500px;
      padding: 16px;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      box-sizing: border-box;
      border: 1px solid var(--input-border);
      border-radius: 6px;
      background-color: var(--input-bg);
      color: var(--text-color);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      font-family: 'Cascadia Code', Consolas, 'DejaVu Sans Mono', Menlo, monospace;

      &:focus {
        border-color: var(--input-focus);
        box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
      }
    }

    .buttons-container {
      display: flex;
      justify-content: flex-end;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background-color: var(--accent-color);
      color: #000000;
      font-size: 13px;
      font-weight: 600;
      transition: background-color 0.15s ease, transform 0.1s ease;

      &:hover {
        background-color: var(--accent-hover);
      }

      &:active {
        transform: scale(0.98);
      }

      &:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
    }

    #resultContainer {
      margin-top: 16px;
      display: none;
      background-color: var(--card-bg);
      padding: 12px;
      border-radius: 6px;
      border: 1px solid var(--input-border);
      word-break: break-all;
      font-size: 13px;
      animation: fadeIn 0.2s ease forwards;
    }

    #resultLink {
      font-weight: 600;
      color: var(--link-color);
      text-decoration: none;

      &:hover {
        text-decoration: underline;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #resultLink {
      font-weight: 600;
      color: var(--link-color);
      text-decoration: none;
      cursor: pointer;
      font-family: 'Cascadia Code', Consolas, 'DejaVu Sans Mono', Menlo, monospace;
    }

    .url-orig {
      font-size: 10px;
      opacity: 0.6;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
      display: inline-block;
      font-family: 'Cascadia Code', Consolas, 'DejaVu Sans Mono', Menlo, monospace;

    }

    .url-short {
      color: var(--link-color, #1a73e8);
      cursor: pointer;
      font-weight: 600;
      word-break: break-all;
      font-family: 'Cascadia Code', Consolas, 'DejaVu Sans Mono', Menlo, monospace;


      &:hover {
        text-decoration: underline;
      }
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--card-bg);
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 6px;
      font-size: 12px;
      border: 1px solid var(--input-border);
    }

    #toast {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: #fff;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px;
      opacity: 0;
      transition: transform 0.2s, opacity 0.2s;
      pointer-events: none;
      z-index: 10;

      &.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <div>
    <h3>Сократить ссылку</h3>
    <input type="text" id="urlInput" placeholder="Вставьте длинную ссылку...">
    <div style="display: flex; flex-direction: row; justify-content: space-between;">
      <div id="resultContainer">
        <span id="resultLink"></span>
      </div>
      <div class="buttons-container">
        <button id="shortenBtn">Сократить</button>
      </div>
    </div>
  </div>

  <div>
    <h3>История сокращений</h3>
    <ul id="historyWrapper"></ul>
  </div>

  <div id="toast">Скопировано в буфер!</div>

  <template id="historyItemTemplate">
    <li class="history-item">
      <span class="url-orig"></span>
      <span class="url-short"></span>
    </li>
  </template>

  <script src="main.js" type="module" defer></script>
</body>
